name: Veille Emploi Quotidienne v2

on:
  schedule:
    - cron: "0 5 * * 1-5"   # Lundi-Vendredi 7h00 (heure d'été Paris = UTC+2)
    # Heure d'hiver (nov-mars) : remplacer par "0 6 * * 1-5"

  workflow_dispatch:          # Déclenchement manuel depuis l'interface GitHub

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser python-dotenv

      - name: Run veille emploi
        env:
          GMAIL_FROM:        ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:          ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PWD:     ${{ secrets.GMAIL_APP_PWD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Adzuna optionnel — ajouter le secret si configuré
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
        run: python veille_emploi_v3.py
